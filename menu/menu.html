<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cravings — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../homepage/style.css" />
  <link rel="stylesheet" href="menu.css" />
</head>
<body class="menu-page">

  <nav>
    <a class="nav-logo" href="../homepage/index.html">Dapur Lodeh</a>
    <ul class="nav-links">
      <li><a href="menu.html" style="color:var(--orange)">Menu</a></li>
      <li><a href="../homepage/index.html#offers">Offers</a></li>
      <li><a href="../homepage/index.html#about">About</a></li>
      <li><a href="../homepage/index.html#contact">Contact</a></li>
    </ul>
    <a href="../Login/login.html" class="nav-login">Log in</a>
  </nav>

  <!-- ── HERO BANNER — diisi JS ── -->
  <div class="menu-hero" id="menu-hero">
    <div class="menu-hero-blob a"></div>
    <div class="menu-hero-blob b"></div>
    <div class="menu-hero-content">
      <p class="menu-hero-tag" id="hero-tag">Menu</p>
      <h1 class="menu-hero-name" id="hero-name">Pilih makananmu</h1>
      <p class="menu-hero-desc" id="hero-desc">Semua menu tersedia dan siap dipesan untuk kamu.</p>
    </div>
    <div class="menu-hero-emoji" id="hero-emoji"></div>
  </div>

  <!-- ── MAIN LAYOUT ── -->
  <div class="menu-layout">

    <!-- ════════════════════════════
         MENU CONTENT (kiri)
    ════════════════════════════ -->
    <section class="menu-content">
      <div class="menu-content-header">
        <h2 class="menu-content-title">Semua Menu</h2>
        <div class="category-tabs" id="cat-tabs">
          <button class="cat-tab active" data-cat="all">Semua</button>
          <button class="cat-tab" data-cat="noodles">Mie</button>
          <button class="cat-tab" data-cat="salad">Salad</button>
          <button class="cat-tab" data-cat="burger">Burger</button>
          <button class="cat-tab" data-cat="rice">Nasi</button>
          <button class="cat-tab" data-cat="drinks">Minuman</button>
        </div>
      </div>

      <div class="menu-grid" id="menu-grid">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- ════════════════════════════
         SIDEBAR — Order Summary (kanan)
    ════════════════════════════ -->
    <aside class="order-sidebar">
      <p class="sidebar-title">🛒 Pesananmu</p>

      <!-- Selected item card -->
      <div class="selected-item-card" id="selected-card">
        <div class="selected-item-top">
          <div class="selected-item-emoji" id="sel-emoji-box">
            <span id="sel-emoji">🍜</span>
          </div>
          <div class="selected-item-info">
            <p class="selected-item-name" id="sel-name">—</p>
            <p class="selected-item-cat"  id="sel-cat">—</p>
          </div>
        </div>
        <div class="qty-row">
          <div class="qty-controls">
            <button class="qty-btn" id="qty-minus">−</button>
            <span   class="qty-num"  id="qty-num">1</span>
            <button class="qty-btn"  id="qty-plus">+</button>
          </div>
          <span class="item-subtotal" id="item-subtotal">Rp 0</span>
        </div>
      </div>

      <!-- Add-ons -->
      <div class="addons-section">
        <p class="addons-title">Tambahan</p>
        <div class="addon-list" id="addon-list">
          <!-- filled by JS based on category -->
        </div>
      </div>

      <!-- Catatan -->
      <div class="note-group">
        <label class="note-label" for="order-note">Catatan</label>
        <textarea class="note-input" id="order-note" placeholder="Contoh: tidak pedas, tanpa bawang…"></textarea>
      </div>

      <!-- Total -->
      <div class="order-total-box">
        <div class="total-row"><span>Subtotal</span>      <span id="total-subtotal">Rp 0</span></div>
        <div class="total-row"><span>Ongkir</span>        <span>Rp 10k</span></div>
        <div class="total-row"><span>Diskon member</span><span>- Rp 0</span></div>
        <div class="total-row main"><span>Total</span>    <span id="total-grand">Rp 0</span></div>
      </div>

      <button class="btn-order" id="btn-order">
        <span>Pesan Sekarang</span>
        <span style="font-size:1.1rem">→</span>
      </button>
    </aside>

  </div>

  <!-- ── TOAST ── -->
  <div id="toast">✅ <span id="toast-msg">Ditambahkan ke pesanan!</span></div>

  <script type="module" src="menu.js"></script>

</body>
</html>
