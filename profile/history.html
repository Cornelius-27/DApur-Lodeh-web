<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dapur Lodeh — Riwayat Pesanan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../homepage/style.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="profile-page">

  <!-- ── NAVBAR ── -->
  <nav>
    <a class="nav-logo" href="../homepage/index.html">Dapur Lodeh</a>
    <ul class="nav-links">
      <li><a href="../menu/menu.html">Menu</a></li>
      <li><a href="../contact/contact.html">Contact</a></li>
    </ul>
    <a href="../Login/login.html" class="nav-login">Log in</a>
  </nav>

  <!-- ── PROFILE WRAPPER ── -->
  <main class="profile-container">
    <div class="history-layout-standalone">
      
      <!-- ── HEADER RIWAYAT ── -->
      <div class="history-header">
        <div class="history-title-area">
          <h2 class="pane-title">Riwayat Pesanan</h2>
          <p class="pane-subtitle">Daftar lengkap transaksi kuliner lezat Anda di Dapur Lodeh.</p>
        </div>
        <div class="history-action-area">
          <a href="profile.html" class="btn-secondary-profile">
            <span>Pengaturan Profil</span>
          </a>
          <a href="../menu/menu.html" class="btn-primary-profile">
            <span>Pesan Makanan</span>
          </a>
        </div>
      </div>

      <!-- ── STATS GRID ── -->
      <div class="history-stats-grid" id="history-stats">
        <!-- Dinamis oleh JS -->
      </div>

      <!-- ── CARDS LIST ── -->
      <div class="orders-history-container" id="orders-history-list">
        <div class="orders-loading-state">
          <div class="btn-save-spinner" style="margin: 0 auto 1.2rem; width: 32px; height: 32px; border-width: 3px; border-color: rgba(232, 98, 26, 0.15); border-top-color: var(--orange);"></div>
          <p>Memuat riwayat transaksi Anda...</p>
        </div>
      </div>

    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <span class="foot-logo">Dapur Lodeh</span>
    <p>© 2026 Dapur Lodeh. All rights reserved.</p>
  </footer>

  <!-- ── TOAST NOTIFICATION ── -->
  <div id="toast">
    <svg style="width: 16px; height: 16px; stroke: currentColor; fill: none;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
    </svg>
    <span id="toast-msg">Status diperbarui!</span>
  </div>

  <!-- Firebase Scripts -->
  <script type="module" src="history.js"></script>

</body>
</html>
