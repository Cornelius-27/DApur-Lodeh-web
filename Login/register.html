<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cravings — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../homepage/style.css" />
  <link rel="stylesheet" href="login.css" />

</head>
<body class="auth-page">

  <!-- ── NAVBAR ── -->
  <nav>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <a class="nav-logo" href="../homepage/index.html">Dapur Lodeh</a>
  </nav>

  <!-- ── AUTH WRAPPER ── -->
  <main class="auth-wrapper">

    <!-- Left: decorative panel -->
    <div class="auth-panel">
      <div class="auth-panel-blob blob-a"></div>
      <div class="auth-panel-blob blob-b"></div>
      <div class="auth-panel-content">
        <p class="panel-eyebrow">Bergabung sekarang</p>
        <h2 class="panel-title">Daftar &amp;<br /><em>nikmati makanan</em><br />favoritmu.</h2>
        <ul class="panel-perks">
          <li><svg class="perk-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 8px; vertical-align: middle; color: #f97316;"><path d="M20 6 9 17l-5-5"/></svg> Checkout lebih cepat</li>
          <li><svg class="perk-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 8px; vertical-align: middle; color: #f97316;"><path d="M20 6 9 17l-5-5"/></svg> Pantau pesanan real time</li>
          <li><svg class="perk-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 8px; vertical-align: middle; color: #f97316;"><path d="M20 6 9 17l-5-5"/></svg> Simpan menu favorit</li>
          <li><svg class="perk-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 8px; vertical-align: middle; color: #f97316;"><path d="M20 6 9 17l-5-5"/></svg> Pengiriman ke lokasi tepat</li>
        </ul>
      </div>
    </div>

    <!-- Right: form card -->
    <div class="auth-form-side">
      <div class="auth-card">

        <div class="auth-card-header">
          <h1 class="auth-title">Buat akun</h1>
          <p class="auth-sub">Sudah punya akun? <a href="login.html" class="auth-link">Masuk di sini</a></p>
        </div>

        <!-- Google Sign-up -->
        <button class="btn-google" id="btn-google-register">
          <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.332 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" fill="#FFC107"/>
            <path d="M6.306 14.691l6.571 4.819C14.655 15.108 19.000 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" fill="#FF3D00"/>
            <path d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.316 0-9.623-3.317-11.281-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" fill="#4CAF50"/>
            <path d="M43.611 20.083H42V20H24v8h11.303a11.966 11.966 0 01-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" fill="#1976D2"/>
          </svg>
          Daftar dengan Google
        </button>

        <div class="auth-divider"><span>atau isi form di bawah</span></div>

        <!-- ── REGISTER FORM ── -->
        <div class="auth-form" id="auth-form">

          <!-- SECTION 1: Data Diri -->
          <p class="form-section-label">📋 Data diri</p>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="first-name">Nama depan</label>
              <input class="form-input" type="text" id="first-name" placeholder="Budi" autocomplete="given-name" />
            </div>
            <div class="form-group">
              <label class="form-label" for="last-name">Nama belakang</label>
              <input class="form-input" type="text" id="last-name" placeholder="Santoso" autocomplete="family-name" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Nomor pelanggan (HP)</label>
            <input class="form-input" type="tel" id="phone" placeholder="08xx-xxxx-xxxx" autocomplete="tel" />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="kamu@email.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="password" placeholder="Min. 8 karakter" autocomplete="new-password" />
              <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Tampilkan password">
                <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Konfirmasi password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="confirm-password" placeholder="Ulangi password" autocomplete="new-password" />
              <button class="toggle-pw" id="toggle-pw-2" type="button" aria-label="Tampilkan konfirmasi password">
                <svg id="eye-open-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eye-closed-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <!-- SECTION 2: Lokasi -->
          <p class="form-section-label">📍 Lokasi pengiriman</p>





          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="kelurahan">Kelurahan / Desa</label>
              <input class="form-input" type="text" id="kelurahan" placeholder="Kelurahan" />
            </div>
            <div class="form-group">
              <label class="form-label" for="kecamatan">Kecamatan</label>
              <input class="form-input" type="text" id="kecamatan" placeholder="Kecamatan" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="kota">Kota / Kabupaten</label>
              <input class="form-input" type="text" id="kota" placeholder="Kota" />
            </div>
            <div class="form-group">
              <label class="form-label" for="kodepos">Kode pos</label>
              <input class="form-input" type="text" id="kodepos" placeholder="12345" maxlength="5" />
            </div>
          </div>

          <!-- Error / Success -->
          <div class="form-error"   id="form-error"   role="alert" aria-live="polite"></div>
          <div class="form-success" id="form-success" role="status" aria-live="polite"></div>

          <button class="btn-submit" id="btn-register" type="button">
            <span class="btn-label">Buat akun</span>
            <span class="btn-spinner" id="btn-spinner" aria-hidden="true"></span>
          </button>

        </div>
        <!-- end auth-form -->

      </div>
    </div>

  </main>
  </script>

  <!-- ══════════════════════════════════════════
       FIREBASE — AUTH + FIRESTORE
  ══════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }                          from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup,
             updateProfile, onAuthStateChanged }      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp }
                                                      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig }                         from "../firebase-config.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isRegistering = false;

    // Redirect if already logged in
    onAuthStateChanged(auth, user => {
      if (user && !isRegistering) {
        const redirect = sessionStorage.getItem("authRedirect") || "../homepage/index.html";
        sessionStorage.removeItem("authRedirect");
        window.location.href = redirect;
      }
    });

    // ── Helpers ──────────────────────────────────────────────
    const showError   = msg => { const el = document.getElementById("form-error");   el.textContent = msg; el.classList.add("visible"); };
    const showSuccess = msg => { const el = document.getElementById("form-success"); el.textContent = msg; el.classList.add("visible"); };
    const clearMsgs   = ()  => {
      ["form-error","form-success"].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = "";
        el.classList.remove("visible");
      });
    };

    function setLoading(on) {
      const btn = document.getElementById("btn-register");
      btn.disabled = on;
      btn.querySelector(".btn-label").style.opacity = on ? "0" : "1";
      document.getElementById("btn-spinner").style.display = on ? "inline-block" : "none";
    }

    function friendlyError(code) {
      const map = {
        "auth/email-already-in-use":  "Email ini sudah terdaftar. Coba masuk.",
        "auth/invalid-email":         "Format email tidak valid.",
        "auth/weak-password":         "Password terlalu lemah. Gunakan minimal 8 karakter.",
        "auth/network-request-failed":"Gagal terhubung. Periksa koneksi internetmu.",
        "auth/popup-closed-by-user":  "Pendaftaran Google dibatalkan.",
      };
      return map[code] || "Terjadi kesalahan. Silakan coba lagi.";
    }

    // Validate phone format Indonesia
    function validPhone(p) { return /^(\+62|62|0)8[0-9]{8,11}$/.test(p.replace(/[-\s]/g,"")); }

    // Save user profile to Firestore
    async function saveUserProfile(uid, data) {
      await setDoc(doc(db, "users", uid), {
        ...data,
        createdAt: serverTimestamp()
      });
    }

    // Build location object from form
    function collectLocation() {
      const latEl = document.getElementById("lat");
      const lngEl = document.getElementById("lng");
      const autoEl = document.getElementById("address-auto");
      const detailEl = document.getElementById("address-detail");
      const kelEl = document.getElementById("kelurahan");
      const kecEl = document.getElementById("kecamatan");
      const kotaEl = document.getElementById("kota");
      const posEl = document.getElementById("kodepos");

      return {
        lat:          latEl ? parseFloat(latEl.value) || null : null,
        lng:          lngEl ? parseFloat(lngEl.value) || null : null,
        addressAuto:  autoEl ? autoEl.value.trim() : "",
        addressDetail:detailEl ? detailEl.value.trim() : "",
        kelurahan:    kelEl ? kelEl.value.trim() : "",
        kecamatan:    kecEl ? kecEl.value.trim() : "",
        kota:         kotaEl ? kotaEl.value.trim() : "",
        kodepos:      posEl ? posEl.value.trim() : "",
      };
    }

    // Validate all fields
    function validate() {
      const firstName = document.getElementById("first-name").value.trim();
      const lastName  = document.getElementById("last-name").value.trim();
      const phone     = document.getElementById("phone").value.trim();
      const email     = document.getElementById("email").value.trim();
      const password  = document.getElementById("password").value;
      const confirm   = document.getElementById("confirm-password").value;
      const kelurahan = document.getElementById("kelurahan").value.trim();
      const kecamatan = document.getElementById("kecamatan").value.trim();
      const kota      = document.getElementById("kota").value.trim();
      const kodepos   = document.getElementById("kodepos").value.trim();

      if (!firstName)              { showError("Nama depan wajib diisi."); return false; }
      if (!lastName)               { showError("Nama belakang wajib diisi."); return false; }
      if (!phone)                  { showError("Nomor HP wajib diisi."); return false; }
      if (!validPhone(phone))      { showError("Format nomor HP tidak valid. Contoh: 0812-3456-7890"); return false; }
      if (!email)                  { showError("Email wajib diisi."); return false; }
      if (password.length < 8)     { showError("Password minimal 8 karakter."); return false; }
      if (password !== confirm)    { showError("Password dan konfirmasi tidak cocok."); return false; }
      if (!kelurahan)              { showError("Kelurahan / Desa wajib diisi."); return false; }
      if (!kecamatan)              { showError("Kecamatan wajib diisi."); return false; }
      if (!kota)                   { showError("Kota / Kabupaten wajib diisi."); return false; }
      if (!kodepos)                { showError("Kode pos wajib diisi."); return false; }
      return true;
    }

    // ── Email/Password Register ───────────────────────────────
    document.getElementById("btn-register").addEventListener("click", async () => {
      clearMsgs();
      if (!validate()) return;

      setLoading(true);
      isRegistering = true;
      const firstName = document.getElementById("first-name").value.trim();
      const lastName  = document.getElementById("last-name").value.trim();
      const phone     = document.getElementById("phone").value.trim();
      const email     = document.getElementById("email").value.trim();
      const password  = document.getElementById("password").value;

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: `${firstName} ${lastName}` });
        await saveUserProfile(cred.user.uid, {
          firstName, lastName,
          displayName: `${firstName} ${lastName}`,
          phone, email,
          location: collectLocation(),
        });
        showSuccess("Akun berhasil dibuat! Mengarahkan ke tujuan Anda…");
        setTimeout(() => { 
          const redirect = sessionStorage.getItem("authRedirect") || "../homepage/index.html";
          sessionStorage.removeItem("authRedirect");
          window.location.href = redirect; 
        }, 1500);
      } catch (err) {
        isRegistering = false;
        console.error("Signup error:", err);
        const detailedError = friendlyError(err.code) + (err.code ? ` (${err.code})` : ` (${err.message || err})`);
        showError(detailedError);
        setLoading(false);
      }
    });

    // ── Google Register ───────────────────────────────────────
    document.getElementById("btn-google-register").addEventListener("click", async () => {
    clearMsgs();

    const phone = document.getElementById("phone").value.trim();
    const loc   = collectLocation();

    // VALIDASI NOMOR HP
    if (!phone) {
        showError("Nomor HP wajib diisi sebelum daftar dengan Google.");
        return;
    }

    if (!validPhone(phone)) {
        showError("Format nomor HP tidak valid.");
        return;
    }

    // VALIDASI ALAMAT
    if (!loc.kelurahan || !loc.kecamatan || !loc.kota || !loc.kodepos) {
        showError("Data lokasi pengiriman (Kelurahan, Kecamatan, Kota, Kode Pos) wajib diisi lengkap.");
        return;
    }

    isRegistering = true;
    try {
        const cred  = await signInWithPopup(auth, provider);
        const user  = cred.user;

        const names = (user.displayName || "").split(" ");

        await saveUserProfile(user.uid, {
        firstName:   names[0] || "",
        lastName:    names.slice(1).join(" ") || "",
        displayName: user.displayName || "",
        phone:       phone,
        email:       user.email || "",
        location:    loc,
        });

        showSuccess("Pendaftaran berhasil! Mengarahkan ke tujuan Anda...");

        setTimeout(() => {
          const redirect = sessionStorage.getItem("authRedirect") || "../homepage/index.html";
          sessionStorage.removeItem("authRedirect");
          window.location.href = redirect;
        }, 1500);

    } catch (err) {
        isRegistering = false;
        console.error("Google Signup error:", err);
        const detailedError = friendlyError(err.code) + (err.code ? ` (${err.code})` : ` (${err.message || err})`);
        showError(detailedError);
    }
    });

    // ── Toggle password ───────────────────────────────────────
    document.getElementById("toggle-pw").addEventListener("click", () => {
      const input = document.getElementById("password");
      const hidden = input.type === "password";
      input.type = hidden ? "text" : "password";
      document.getElementById("eye-open").style.display   = hidden ? "none"   : "inline";
      document.getElementById("eye-closed").style.display = hidden ? "inline" : "none";
    });

    document.getElementById("toggle-pw-2").addEventListener("click", () => {
      const input = document.getElementById("confirm-password");
      const hidden = input.type === "password";
      input.type = hidden ? "text" : "password";
      document.getElementById("eye-open-2").style.display   = hidden ? "none"   : "inline";
      document.getElementById("eye-closed-2").style.display = hidden ? "inline" : "none";
    });

    // ── Phone formatting ──────────────────────────────────────
    document.getElementById("phone").addEventListener("input", function() {
      let v = this.value.replace(/\D/g, "");
      if (v.startsWith("62")) v = "0" + v.slice(2);
      // Format: 0812-3456-7890
      this.value = v.replace(/(\d{4})(\d{4})(\d{0,4})/, "$1-$2-$3").replace(/-$/, "");
    });
  </script>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hamburger = document.getElementById('navHamburger');
      const navLinks = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', () => {
          navLinks.classList.toggle('active');
        });
      }
    });
  </script>

</body>
</html>
