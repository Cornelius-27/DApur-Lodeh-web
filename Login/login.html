<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cravings — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../homepage/style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="auth-page">

  <!-- ── NAVBAR ── -->
  <nav>
    <a class="nav-logo" href="../homepage/index.html">Dapur Lodeh</a>
  </nav>

  <!-- ── AUTH WRAPPER ── -->
  <main class="auth-wrapper">

    <!-- Left: decorative panel -->
    <div class="auth-panel">
      <div class="auth-panel-blob blob-a"></div>
      <div class="auth-panel-blob blob-b"></div>
      <div class="auth-panel-content">
        <p class="panel-eyebrow">🍽 Welcome back</p>
        <h2 class="panel-title">Your next<br /><em>favourite meal</em><br />is one login away.</h2>
        <ul class="panel-perks">
          <li>⚡ Lightning-fast checkout</li>
          <li>📦 Track orders in real time</li>
          <li>❤️ Save your favourite dishes</li>
          <li>🎁 Exclusive member deals</li>
        </ul>
      </div>
    </div>

    <!-- Right: form card -->
    <div class="auth-form-side">
      <div class="auth-card">

        <div class="auth-card-header">
          <h1 class="auth-title">Log in</h1>
          <p class="auth-sub">Don't have an account? <a href="register.html" class="auth-link">Sign up free</a></p>
        </div>

        <!-- Google Sign-in -->
        <button class="btn-google" id="btn-google-login">
          <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.332 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" fill="#FFC107"/>
            <path d="M6.306 14.691l6.571 4.819C14.655 15.108 19.000 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" fill="#FF3D00"/>
            <path d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.316 0-9.623-3.317-11.281-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" fill="#4CAF50"/>
            <path d="M43.611 20.083H42V20H24v8h11.303a11.966 11.966 0 01-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" fill="#1976D2"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider"><span>or continue with email</span></div>

        <div class="auth-form" id="auth-form">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="password">Password</label>
              <a href="forgot.html" class="auth-link forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
              <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Toggle password visibility">
                <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="form-error" id="form-error" role="alert" aria-live="polite"></div>

          <button class="btn-submit" id="btn-login" type="button">
            <span class="btn-label">Log in</span>
            <span class="btn-spinner" id="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>

      </div>
    </div>

  </main>

  <script type="module">
    import { initializeApp }                      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup,
             onAuthStateChanged }                 from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { firebaseConfig }                     from "../firebase-config.js";
    
    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, user => {
      if (user) {
        if (user.email === "admindapur@gmail.com" || user.email === "admin@gmail.com" || user.email === "onel2@gmail.com") {
          window.location.href = "../admin/admin.html";
        } else {
          window.location.href = "../homepage/index.html";
        }
      }
    });

    function showError(msg) {
      const el = document.getElementById("form-error");
      el.textContent = msg;
      el.classList.add("visible");
    }
    

    function clearError() {
      const el = document.getElementById("form-error");
      el.textContent = "";
      el.classList.remove("visible");
    }

    function setLoading(on) {
      const btn   = document.getElementById("btn-login");
      btn.disabled = on;
      btn.querySelector(".btn-label").style.opacity  = on ? "0" : "1";
      document.getElementById("btn-spinner").style.display = on ? "inline-block" : "none";
    }

    function friendlyError(code) {
      const map = {
        "auth/invalid-email":          "Alamat email tidak valid.",
        "auth/user-not-found":         "Akun dengan email ini tidak ditemukan.",
        "auth/wrong-password":         "Password salah. Coba lagi.",
        "auth/too-many-requests":      "Terlalu banyak percobaan. Tunggu sebentar.",
        "auth/network-request-failed": "Gagal terhubung. Periksa koneksi internetmu.",
        "auth/user-disabled":          "Akun ini telah dinonaktifkan.",
        "auth/popup-closed-by-user":   "Login Google dibatalkan.",
      };
      return map[code] || "Terjadi kesalahan. Silakan coba lagi.";
    }

    document.getElementById("btn-login").addEventListener("click", async () => {
      clearError();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) { showError("Isi email dan password terlebih dahulu."); return; }
      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        if (email === "admindapur@gmail.com" || email === "admin@gmail.com" || email === "onel2@gmail.com") {
          window.location.href = "../admin/admin.html";
        } else {
          window.location.href = "../homepage/index.html";
        }
      } catch (err) {
        // Otomatis daftar jika menggunakan email admindapur@gmail.com
        if (email === "admindapur@gmail.com" && password === "admin123" && (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential")) {
          try {
            await createUserWithEmailAndPassword(auth, email, password);
            window.location.href = "../admin/admin.html";
            return;
          } catch (createErr) {
            showError("Gagal membuat akun admin otomatis: " + createErr.message);
          }
        } else {
          showError(friendlyError(err.code));
        }
        setLoading(false);
      }
    });

    document.getElementById("btn-google-login").addEventListener("click", async () => {
      clearError();
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "../homepage/index.html";
      } catch (err) {
        showError(friendlyError(err.code));
      }
    });

    document.getElementById("toggle-pw").addEventListener("click", () => {
      const input = document.getElementById("password");
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      document.getElementById("eye-open").style.display   = isHidden ? "none"   : "inline";
      document.getElementById("eye-closed").style.display = isHidden ? "inline" : "none";
    });

    ["email", "password"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("btn-login").click();
      });
    });
  </script>

</body>
</html>
